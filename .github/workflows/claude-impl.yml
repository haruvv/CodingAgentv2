name: Claude Implementation

on:
  issues:
    types: [labeled]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code Action
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          label_trigger: ready-for-impl
          branch_prefix: impl/
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_instructions: |
            CLAUDE.md の指示に従い、このIssueの内容を実装してください。
            実装完了後、Issueに作業完了のコメントを残してください。
            Pull Request の作成はワークフローが自動で行うため、あなたが作成する必要はありません。

      - name: Create Pull Request
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "feat: $ISSUE_TITLE" \
            --body "## 変更概要

          Closes #$ISSUE_NUMBER

          ## 実施内容

          Issue #$ISSUE_NUMBER の内容を Claude が実装しました。

          ## 懸念点 / 未対応事項

          " \
            --label "ai-generated" \
            --label "ready-for-review"
