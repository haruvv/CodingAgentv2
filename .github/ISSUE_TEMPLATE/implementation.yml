name: AI実装依頼
description: Claudeに実装を依頼するためのIssueテンプレート
labels: ["todo"]
body:
  - type: textarea
    id: purpose
    attributes:
      label: 目的
      description: この実装で何を達成したいか
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 実装内容
      description: 具体的に何を実装するか
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 完了条件
      description: 何をもって完了とするか（テスト・動作確認の基準など）
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 制約事項
      description: 変更してはいけない範囲・注意事項など

  - type: textarea
    id: related
    attributes:
      label: 関連ファイル / 関連Issue（任意）
      description: 参照すべきファイルパスや関連するIssue番号
